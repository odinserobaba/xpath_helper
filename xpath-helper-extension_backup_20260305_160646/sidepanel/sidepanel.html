<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>XPath Helper</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            width: 400px;
            min-height: 400px;
            padding: 15px;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #1a1a2e;
            color: #eee;
            font-size: 13px;
        }
        h1 { color: #00d4aa; margin-bottom: 15px; font-size: 18px; }
        .status { 
            padding: 12px; 
            background: #16213e; 
            border-radius: 6px; 
            margin-bottom: 15px;
            border: 1px solid #2a2a4a;
        }
        .status strong { color: #00d4aa; }
        .log {
            font-family: 'Consolas', 'Monaco', monospace;
            font-size: 11px;
            background: #0f0f1a;
            padding: 10px;
            border-radius: 4px;
            max-height: 350px;
            overflow-y: auto;
            border: 1px solid #2a2a4a;
        }
        .log div { 
            margin: 4px 0; 
            padding: 3px 0;
            border-bottom: 1px solid #1a1a2e;
        }
        .log .info { color: #00d4aa; }
        .log .warn { color: #f39c12; }
        .log .error { color: #e74c3c; }
        .log .debug { color: #667eea; }
        .element-info {
            background: #16213e;
            padding: 10px;
            border-radius: 6px;
            margin-top: 10px;
            border: 1px solid #00d4aa;
        }
        .element-info h3 { color: #00d4aa; font-size: 12px; margin-bottom: 8px; }
        .element-info code { 
            display: block; 
            background: #0f0f1a; 
            padding: 8px; 
            border-radius: 4px;
            font-size: 11px;
            word-break: break-all;
        }
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: #0f0f1a; }
        ::-webkit-scrollbar-thumb { background: #2a2a4a; border-radius: 3px; }
        ::-webkit-scrollbar-thumb:hover { background: #00d4aa; }
    </style>
</head>
<body>
    <h1>✦ XPath Helper</h1>
    
    <div class="status">
        <strong>Статус:</strong> <span id="statusText">Загрузка...</span>
    </div>
    
    <div id="elementInfo" class="element-info" style="display:none;">
        <h3>📍 Текущий элемент:</h3>
        <code id="elementCode"></code>
    </div>
    
    <div class="log" id="log">
        <div class="info">Side panel opened</div>
    </div>
    
    <script src="sidepanel.js"></script>
</body>
</html>
