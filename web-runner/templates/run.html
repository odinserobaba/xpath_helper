<!doctype html>
<html lang="ru">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Run {{ run_id }}</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;600;700&family=Outfit:wght@400;600;700&display=swap" rel="stylesheet" />
  <style>
    :root {
      --bg: #070812;
      --bg-card: rgba(18, 22, 40, 0.85);
      --bg-panel: rgba(12, 16, 32, 0.92);
      --border: rgba(0, 255, 200, 0.12);
      --text: #e8eaf6;
      --muted: #8b92b0;
      --accent: #00f5c4;
      --accent-dim: rgba(0, 245, 196, 0.45);
      --err: #ff6b8a;
      --ok: #5ef2a0;
      --warn: #ffc857;
      --log-bg: #05070f;
      --glow: 0 0 24px rgba(0, 245, 196, 0.08);
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: "Outfit", system-ui, sans-serif;
      background:
        radial-gradient(ellipse 120% 80% at 10% -20%, rgba(0, 245, 196, 0.07), transparent 50%),
        radial-gradient(ellipse 80% 60% at 100% 0%, rgba(120, 80, 255, 0.06), transparent 45%),
        var(--bg);
      color: var(--text);
      min-height: 100vh;
    }
    .wrap { max-width: 1320px; margin: 0 auto; padding: 20px; }
    .card {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 20px 22px;
      box-shadow: var(--glow), inset 0 1px 0 rgba(255,255,255,0.04);
      backdrop-filter: blur(12px);
    }
    a { color: var(--accent); text-decoration: none; font-weight: 600; }
    a:hover { text-decoration: underline; text-underline-offset: 3px; }
    h1 {
      font-size: 1.15rem;
      margin: 0 0 8px 0;
      font-weight: 700;
      letter-spacing: -0.02em;
      background: linear-gradient(105deg, var(--accent), #a8f);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }
    .top { display: flex; justify-content: space-between; gap: 12px; flex-wrap: wrap; align-items: center; }
    .pill {
      display: inline-block;
      padding: 3px 10px;
      border-radius: 999px;
      font-size: 11px;
      font-family: "JetBrains Mono", monospace;
      font-weight: 600;
      letter-spacing: 0.04em;
    }
    .pill.ok { background: rgba(94, 242, 160, 0.15); color: var(--ok); border: 1px solid rgba(94, 242, 160, 0.35); }
    .pill.fail { background: rgba(255, 107, 138, 0.12); color: var(--err); border: 1px solid rgba(255, 107, 138, 0.35); }
    .pill.run { background: rgba(0, 245, 196, 0.1); color: var(--accent); border: 1px solid var(--border); animation: pulse 1.4s ease-in-out infinite; }
    @keyframes pulse { 0%,100% { opacity: 1; } 50% { opacity: 0.65; } }
    .meta { display: flex; gap: 14px; flex-wrap: wrap; margin-top: 10px; color: var(--muted); font-size: 12px; align-items: center; }
    .grid { display: grid; grid-template-columns: 1fr minmax(320px, 440px); gap: 16px; margin-top: 16px; }
    @media (max-width: 1060px) { .grid { grid-template-columns: 1fr; } }
    .panel {
      background: var(--bg-panel);
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 14px 16px;
      min-height: 240px;
      display: flex;
      flex-direction: column;
    }
    .panel h2 {
      margin: 0 0 12px 0;
      font-size: 11px;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 0.14em;
      font-weight: 700;
    }
    .steps-scroll {
      flex: 1;
      overflow: auto;
      max-height: min(68vh, 720px);
      padding-right: 4px;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }
    .steps-scroll::-webkit-scrollbar { width: 6px; }
    .steps-scroll::-webkit-scrollbar-thumb { background: rgba(0, 245, 196, 0.25); border-radius: 6px; }

    .step-card {
      border-radius: 12px;
      border: 1px solid rgba(255,255,255,0.06);
      background: linear-gradient(145deg, rgba(255,255,255,0.03), rgba(0,0,0,0.15));
      padding: 12px 14px;
      border-left: 4px solid var(--accent-dim);
      transition: border-color 0.2s, box-shadow 0.2s;
    }
    .step-card.current {
      box-shadow: 0 0 0 1px rgba(0, 245, 196, 0.35), 0 8px 32px rgba(0, 0, 0, 0.35);
      border-left-color: var(--accent);
    }
    .step-card__row1 {
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      gap: 8px 12px;
      margin-bottom: 6px;
    }
    .step-num {
      font-family: "JetBrains Mono", monospace;
      font-weight: 700;
      font-size: 13px;
      color: var(--accent);
    }
    .action-tag {
      font-family: "JetBrains Mono", monospace;
      font-size: 11px;
      padding: 2px 8px;
      border-radius: 6px;
      background: rgba(168, 136, 255, 0.12);
      color: #c4b5ff;
      border: 1px solid rgba(168, 136, 255, 0.25);
    }
    .dur {
      font-family: "JetBrains Mono", monospace;
      font-size: 11px;
      color: var(--muted);
      margin-left: auto;
    }
    .step-title {
      font-size: 13px;
      font-weight: 600;
      color: var(--text);
      margin: 4px 0;
      line-height: 1.35;
    }
    .tag-mini {
      display: inline-block;
      font-size: 10px;
      padding: 2px 6px;
      margin: 2px 4px 2px 0;
      border-radius: 4px;
      background: rgba(255,255,255,0.06);
      color: var(--muted);
      font-family: "JetBrains Mono", monospace;
    }
    .mono-block {
      font-family: "JetBrains Mono", monospace;
      font-size: 11px;
      line-height: 1.45;
      color: #9ad;
      background: rgba(0,0,0,0.35);
      border: 1px solid rgba(255,255,255,0.06);
      border-radius: 8px;
      padding: 8px 10px;
      margin-top: 8px;
      word-break: break-all;
      white-space: pre-wrap;
    }
    .mono-label {
      font-size: 10px;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: var(--muted);
      margin-top: 8px;
    }
    .step-extras {
      font-size: 11px;
      color: var(--muted);
      margin-top: 8px;
      line-height: 1.5;
    }
    .step-extras strong { color: var(--warn); font-weight: 600; }
    .shot-row { margin-top: 8px; display: flex; flex-wrap: wrap; gap: 8px; align-items: center; }
    .shot-row a {
      font-size: 11px;
      font-family: "JetBrains Mono", monospace;
    }
    .shot-row img {
      max-height: 48px;
      border-radius: 6px;
      border: 1px solid var(--border);
      vertical-align: middle;
    }

    .log-hud {
      flex: 1;
      display: flex;
      flex-direction: column;
      min-height: 200px;
      max-height: min(68vh, 720px);
      border-radius: 12px;
      background: var(--log-bg);
      border: 1px solid rgba(0, 245, 196, 0.15);
      box-shadow: inset 0 0 60px rgba(0, 40, 80, 0.25), 0 0 40px rgba(0, 245, 196, 0.04);
      overflow: hidden;
      position: relative;
    }
    .log-hud::before {
      content: "";
      position: absolute;
      inset: 0;
      background-image:
        linear-gradient(rgba(0, 245, 196, 0.03) 1px, transparent 1px),
        linear-gradient(90deg, rgba(0, 245, 196, 0.02) 1px, transparent 1px);
      background-size: 100% 24px, 18px 100%;
      pointer-events: none;
      opacity: 0.5;
    }
    .log-lines {
      flex: 1;
      overflow: auto;
      padding: 10px 12px;
      font-family: "JetBrains Mono", monospace;
      font-size: 11px;
      line-height: 1.55;
      position: relative;
      z-index: 1;
    }
    .log-lines::-webkit-scrollbar { width: 6px; }
    .log-lines::-webkit-scrollbar-thumb { background: rgba(0, 245, 196, 0.2); border-radius: 6px; }
    .log-line {
      display: flex;
      gap: 10px;
      align-items: baseline;
      padding: 4px 8px;
      margin-bottom: 2px;
      border-radius: 6px;
      border-left: 2px solid transparent;
    }
    .log-line:hover { background: rgba(255,255,255,0.03); }
    .log-line[data-k="created"] { border-left-color: #8892ff; }
    .log-line[data-k="run"] { border-left-color: var(--accent); }
    .log-line[data-k="nav"] { border-left-color: #64b5f6; }
    .log-line[data-k="step"] { border-left-color: #ce93d8; }
    .log-line[data-k="done_ok"] { border-left-color: var(--ok); }
    .log-line[data-k="done_fail"] { border-left-color: var(--err); }
    .log-line[data-k="end"] { border-left-color: #ffd54f; }
    .log-line[data-k="misc"] { border-left-color: rgba(255,255,255,0.15); }
    .log-ts { color: #5c6b8a; flex: 0 0 76px; font-size: 10px; }
    .log-badge {
      flex: 0 0 auto;
      font-size: 9px;
      font-weight: 700;
      letter-spacing: 0.06em;
      padding: 2px 6px;
      border-radius: 4px;
      text-transform: uppercase;
    }
    .log-badge.b-created { background: rgba(136, 146, 255, 0.2); color: #aab4ff; }
    .log-badge.b-run { background: rgba(0, 245, 196, 0.15); color: var(--accent); }
    .log-badge.b-nav { background: rgba(100, 181, 246, 0.15); color: #90caf9; }
    .log-badge.b-step { background: rgba(206, 147, 216, 0.15); color: #e1bee7; }
    .log-badge.b-ok { background: rgba(94, 242, 160, 0.15); color: var(--ok); }
    .log-badge.b-fail { background: rgba(255, 107, 138, 0.15); color: var(--err); }
    .log-badge.b-end { background: rgba(255, 213, 79, 0.12); color: #ffe082; }
    .log-badge.b-misc { background: rgba(255,255,255,0.06); color: var(--muted); }
    .log-msg { color: #c5cae0; flex: 1; word-break: break-word; }
    .log-msg .hi { color: var(--accent); font-weight: 600; }
    .log-msg .dim { color: var(--muted); }

    #deriveBtn {
      margin-left: auto;
      background: linear-gradient(135deg, rgba(0, 245, 196, 0.15), rgba(168, 136, 255, 0.12));
      border: 1px solid rgba(0, 245, 196, 0.35);
      color: var(--text);
      border-radius: 10px;
      padding: 8px 14px;
      cursor: pointer;
      font-weight: 700;
      font-family: inherit;
      font-size: 12px;
      transition: transform 0.15s, box-shadow 0.15s;
    }
    #deriveBtn:hover:not(:disabled) { transform: translateY(-1px); box-shadow: 0 4px 20px rgba(0, 245, 196, 0.15); }
    #deriveBtn:disabled { opacity: 0.45; cursor: not-allowed; }
    .pill.soft { background: rgba(255,200,87,0.2); color: #ffc857; border: 1px solid rgba(255,200,87,0.5); }
    .step-card.soft-fail { border-left-color: #ffc857; }
    #stopRunBtn {
      background: #3a1510;
      border: 1px solid #ff8a65;
      color: #ffccbc;
      border-radius: 10px;
      padding: 6px 12px;
      cursor: pointer;
      font-weight: 700;
      font-family: inherit;
      font-size: 12px;
    }
    #stopRunBtn:hover { filter: brightness(1.08); }
  </style>
</head>
<body>
  <script>
    window.__XPATH_RUNNER_TOKEN__ = {{ runner_token | tojson }};
  </script>
  <div class="wrap">
    <div class="card">
      <div class="top">
        <h1>Live run · <span style="-webkit-text-fill-color:var(--accent);font-family:'JetBrains Mono',monospace">{{ run_id }}</span></h1>
        <div><a href="/">← К списку</a></div>
      </div>
      <div class="meta">
        <span id="scenarioName">Scenario: —</span>
        <span id="counts"><span class="pill ok">OK: 0</span> <span class="pill fail">FAIL: 0</span></span>
        <a id="reportLink" href="/runs/{{ run_id }}/report">report.json</a>
        <a id="logLink" href="/runs/{{ run_id }}/log">log.txt</a>
        <button id="stopRunBtn" type="button" title="Остановка между шагами (POST /api/runs/…/stop)">⏹ Стоп прогона</button>
        <button id="deriveBtn" type="button">Create stabilized scenario</button>
        <button id="debugContinueBtn" type="button" style="display:none;background:#332700;border:1px solid #ffc857;color:#ffc857;border-radius:10px;padding:6px 10px;cursor:pointer;font-weight:700;">Продолжить отладку (debug-continue)</button>
      </div>

      <div class="grid">
        <div class="panel">
          <h2>Шаги</h2>
          <div class="steps-scroll" id="stepsScroll"></div>
        </div>
        <div class="panel">
          <h2>Log · stream</h2>
          <div class="log-hud">
            <div class="log-lines" id="logLines"></div>
          </div>
        </div>
      </div>
    </div>
  </div>

  <script>
    const runId = "{{ run_id }}";
    /** @type {Map<number, object>} */
    const steps = new Map();
    let okCount = 0, failCount = 0;
    let currentStep = null;
    let runFinished = false;

    const els = {
      stepsScroll: document.getElementById("stepsScroll"),
      logLines: document.getElementById("logLines"),
      scenarioName: document.getElementById("scenarioName"),
      counts: document.getElementById("counts"),
      deriveBtn: document.getElementById("deriveBtn"),
      stopRunBtn: document.getElementById("stopRunBtn"),
      debugContinueBtn: document.getElementById("debugContinueBtn"),
    };
    els.deriveBtn.disabled = true;
    if (els.stopRunBtn) {
      els.stopRunBtn.addEventListener("click", async () => {
        try {
          const tok = (window.__XPATH_RUNNER_TOKEN__ && String(window.__XPATH_RUNNER_TOKEN__).trim()) || "";
          const headers = {};
          if (tok) headers["x-runner-token"] = tok;
          const r = await fetch("/api/runs/" + runId + "/stop", { method: "POST", headers });
          const j = await r.json();
          if (!j.ok) throw new Error(j.error || "stop failed");
          appendLogLine({
            ts: Date.now() / 1000,
            kind: "misc",
            badge: "stop",
            badgeClass: "b-misc",
            htmlParts: [{ text: "запрошена остановка прогона" }],
          });
        } catch (e) {
          appendLogLine({
            ts: Date.now() / 1000,
            kind: "misc",
            badge: "err",
            badgeClass: "b-fail",
            htmlParts: [{ text: "стоп: " + (e && e.message ? e.message : String(e)) }],
          });
        }
      });
    }
    els.deriveBtn.title = "Available after successful run (failCount=0)";
    els.debugContinueBtn.addEventListener("click", async () => {
      try {
        await fetch("/api/runs/" + runId + "/debug-continue", { method: "POST" });
        els.debugContinueBtn.style.display = "none";
      } catch (_) {}
    });

    function esc(s) {
      if (s == null) return "";
      const d = document.createElement("span");
      d.textContent = String(s);
      return d.textContent;
    }

    function shotHref(filename) {
      if (!filename) return "";
      const base = String(filename).split("/").pop();
      return "/runs/" + runId + "/screenshots/" + encodeURIComponent(base);
    }

    function formatTs(ts) {
      if (ts == null) return "--:--:--";
      const d = new Date(ts * 1000);
      const p = (n) => String(n).padStart(2, "0");
      return p(d.getHours()) + ":" + p(d.getMinutes()) + ":" + p(d.getSeconds());
    }

    /** Append one log row; o has ts, kind, badge, badgeClass, htmlParts[{text, cls?}]. */
    function appendLogLine(o) {
      const row = document.createElement("div");
      row.className = "log-line";
      row.dataset.k = o.kind;

      const tsel = document.createElement("span");
      tsel.className = "log-ts";
      tsel.textContent = formatTs(o.ts);

      const badge = document.createElement("span");
      badge.className = "log-badge " + o.badgeClass;
      badge.textContent = o.badge;

      const msg = document.createElement("span");
      msg.className = "log-msg";
      for (const part of o.htmlParts || []) {
        const span = document.createElement("span");
        if (part.cls) span.className = part.cls;
        span.textContent = part.text;
        msg.appendChild(span);
      }

      row.appendChild(tsel);
      row.appendChild(badge);
      row.appendChild(msg);
      els.logLines.appendChild(row);
      els.logLines.scrollTop = els.logLines.scrollHeight;
    }

    function mergeStep(no, patch) {
      const prev = steps.get(no) || { step: no };
      steps.set(no, { ...prev, ...patch });
    }

    function renderSteps() {
      const list = [...steps.values()].sort((a, b) => (a.step || 0) - (b.step || 0));
      els.stepsScroll.textContent = "";

      for (const s of list) {
        const card = document.createElement("article");
        card.className = "step-card";
        const col = (s.stepColor || "").trim();
        if (col && /^#[0-9A-Fa-f]{3,8}$/.test(col)) {
          card.style.borderLeftColor = col;
        }
        if (currentStep != null && s.step === currentStep && s.ok == null) {
          card.classList.add("current");
        }
        if (s.ok === false && s.softFailure) {
          card.classList.add("soft-fail");
        }

        const row1 = document.createElement("div");
        row1.className = "step-card__row1";

        const num = document.createElement("span");
        num.className = "step-num";
        num.textContent = "#" + (s.step ?? "");

        const act = document.createElement("span");
        act.className = "action-tag";
        act.textContent = esc(s.action || "—");

        row1.appendChild(num);
        row1.appendChild(act);

        if (s.durationMs != null) {
          const dur = document.createElement("span");
          dur.className = "dur";
          dur.textContent = s.durationMs + " ms";
          row1.appendChild(dur);
        }

        const st = document.createElement("span");
        st.style.marginLeft = s.durationMs == null ? "auto" : "";
        if (s.ok === true) {
          st.className = "pill ok";
          st.textContent = "OK";
        } else if (s.ok === false) {
          if (s.softFailure) {
            st.className = "pill soft";
            st.textContent = "SOFT";
          } else {
            st.className = "pill fail";
            st.textContent = "FAIL";
          }
        } else {
          st.className = "pill run";
          st.textContent = "RUN";
        }
        row1.appendChild(st);

        card.appendChild(row1);

        if (s.title) {
          const title = document.createElement("div");
          title.className = "step-title";
          title.textContent = s.title;
          card.appendChild(title);
        }

        if (s.note) {
          const nt = document.createElement("div");
          nt.className = "step-extras";
          nt.style.color = "var(--muted)";
          nt.textContent = s.note;
          card.appendChild(nt);
        }

        if (s.tags && s.tags.length) {
          for (const tg of s.tags) {
            const t = document.createElement("span");
            t.className = "tag-mini";
            t.textContent = esc(tg);
            card.appendChild(t);
          }
        }

        if (s.navigateUrl) {
          const lbl = document.createElement("div");
          lbl.className = "mono-label";
          lbl.textContent = "Navigate";
          card.appendChild(lbl);
          const code = document.createElement("div");
          code.className = "mono-block";
          code.textContent = s.navigateUrl;
          card.appendChild(code);
        } else if (s.xpath) {
          const lbl = document.createElement("div");
          lbl.className = "mono-label";
          lbl.textContent = "XPath";
          card.appendChild(lbl);
          const code = document.createElement("div");
          code.className = "mono-block";
          code.textContent = s.xpath;
          card.appendChild(code);
        }

        if (s.timeoutMs != null && s.ok == null) {
          const ex = document.createElement("div");
          ex.className = "step-extras";
          ex.textContent = "timeout: " + s.timeoutMs + " ms";
          card.appendChild(ex);
        }

        if (s.selectorUsed && s.selectorUsed !== s.xpath && s.ok !== null) {
          const lbl = document.createElement("div");
          lbl.className = "mono-label";
          lbl.textContent = "Selector used";
          card.appendChild(lbl);
          const code = document.createElement("div");
          code.className = "mono-block";
          code.textContent = s.selectorUsed;
          card.appendChild(code);
        }

        if (s.selectorStats && typeof s.selectorStats === "object" && s.ok === false) {
          const stx = document.createElement("div");
          stx.className = "step-extras";
          stx.style.fontFamily = "JetBrains Mono, monospace";
          stx.textContent =
            "Совпадения XPath: всего " +
            (s.selectorStats.total ?? "?") +
            ", видимых " +
            (s.selectorStats.visible ?? "?");
          card.appendChild(stx);
        }

        if (s.urlAfter) {
          const ex = document.createElement("div");
          ex.className = "step-extras";
          const strong = document.createElement("strong");
          strong.textContent = "URL · ";
          ex.appendChild(strong);
          ex.appendChild(document.createTextNode(esc(s.urlAfter)));
          card.appendChild(ex);
        }

        if (s.branchResult != null || s.jumpTo != null) {
          const ex = document.createElement("div");
          ex.className = "step-extras";
          ex.textContent =
            "branch: " +
            (s.branchResult == null ? "—" : s.branchResult ? "yes" : "no") +
            (s.jumpTo != null ? " → #" + s.jumpTo : "");
          card.appendChild(ex);
        }

        if (s.error) {
          const ex = document.createElement("div");
          ex.className = "step-extras";
          ex.style.color = "var(--err)";
          ex.textContent = s.error;
          card.appendChild(ex);
        }

        const shots = [];
        if (s.screenshot) shots.push(["shot", s.screenshot]);
        if (s.after && s.after !== s.screenshot) shots.push(["after", s.after]);
        if (s.before) shots.push(["before", s.before]);
        if (shots.length) {
          const wrap = document.createElement("div");
          wrap.className = "shot-row";
          for (const [label, path] of shots) {
            const href = shotHref(path);
            const a = document.createElement("a");
            a.href = href;
            a.target = "_blank";
            a.rel = "noopener";
            a.textContent = label;
            wrap.appendChild(a);
            if (label === "shot" || label === "after") {
              const im = document.createElement("img");
              im.src = href;
              im.alt = label;
              wrap.appendChild(im);
            }
          }
          card.appendChild(wrap);
        }

        els.stepsScroll.appendChild(card);
        if (card.classList.contains("current")) {
          requestAnimationFrame(() => card.scrollIntoView({ block: "center", behavior: "smooth" }));
        }
      }

      els.counts.innerHTML =
        '<span class="pill ok">OK: ' + okCount + "</span> " +
        '<span class="pill fail">FAIL: ' + failCount + "</span>";
      els.deriveBtn.disabled = !(runFinished && failCount === 0);
    }

    const es = new EventSource("/api/runs/" + runId + "/events");
    es.onmessage = (ev) => {
      let msg;
      try {
        msg = JSON.parse(ev.data);
      } catch {
        return;
      }
      const e = msg.event;
      const ts = msg.ts;

      if (e === "created") {
        if (msg.scenario) els.scenarioName.textContent = "Scenario: " + msg.scenario;
        appendLogLine({
          ts,
          kind: "created",
          badge: "init",
          badgeClass: "b-created",
          htmlParts: [{ text: "run created · " }, { text: "scenarioId=", cls: "hi" }, { text: String(msg.scenarioId || "") }],
        });
      } else if (e === "run_start") {
        if (msg.scenario) els.scenarioName.textContent = "Scenario: " + msg.scenario;
        appendLogLine({
          ts,
          kind: "run",
          badge: "run",
          badgeClass: "b-run",
          htmlParts: [
            { text: "start" },
            { text: " · steps=", cls: "dim" },
            { text: String(msg.stepsCount ?? ""), cls: "hi" },
          ],
        });
      } else if (e === "navigated") {
        const parts = [{ text: String(msg.currentUrl || msg.url || "") }];
        if (msg.requestedUrl) {
          parts.push({ text: " ← ", cls: "dim" });
          parts.push({ text: String(msg.requestedUrl), cls: "dim" });
        }
        appendLogLine({
          ts,
          kind: "nav",
          badge: "url",
          badgeClass: "b-nav",
          htmlParts: parts,
        });
      } else if (e === "cdp_attach") {
        appendLogLine({
          ts,
          kind: "misc",
          badge: "cdp",
          badgeClass: "b-misc",
          htmlParts: [{ text: String(msg.endpoint || "") }],
        });
      } else if (e === "step_start") {
        currentStep = msg.step;
        mergeStep(msg.step, {
          step: msg.step,
          action: msg.action,
          title: msg.title || "",
          note: msg.note || "",
          qaStatus: msg.qaStatus || "",
          tags: msg.tags || [],
          stepColor: msg.stepColor || "",
          xpath: msg.xpath || "",
          navigateUrl: msg.navigateUrl || "",
          timeoutMs: msg.timeoutMs,
          ok: null,
          error: null,
          screenshot: null,
        });
        const parts = [
          { text: "#" + msg.step, cls: "hi" },
          { text: " " + (msg.action || "") + " ", cls: "dim" },
        ];
        if (msg.title) parts.push({ text: "«" + msg.title + "»" });
        appendLogLine({
          ts,
          kind: "step",
          badge: "step",
          badgeClass: "b-step",
          htmlParts: parts,
        });
      } else if (e === "step_done") {
        const cur = steps.get(msg.step) || { step: msg.step };
        mergeStep(msg.step, {
          action: msg.action || cur.action,
          ok: msg.ok,
          error: msg.error || null,
          screenshot: msg.screenshot || null,
          before: msg.before || null,
          after: msg.after || null,
          durationMs: msg.durationMs,
          title: msg.title != null && msg.title !== "" ? msg.title : cur.title,
          tags: msg.tags && msg.tags.length ? msg.tags : cur.tags,
          stepColor: msg.stepColor || cur.stepColor,
          selectorUsed: msg.selectorUsed || cur.selectorUsed,
          urlAfter: msg.urlAfter || cur.urlAfter,
          branchResult: msg.branchResult,
          jumpTo: msg.jumpTo,
          xpath: cur.xpath || "",
          navigateUrl: cur.navigateUrl || "",
          softFailure: !!msg.softFailure,
          selectorStats: msg.selectorStats || null,
        });
        if (msg.ok) okCount++;
        else failCount++;
        const parts = [
          { text: "#" + msg.step, cls: "hi" },
          {
            text: msg.ok ? " OK" : msg.softFailure ? " SOFT" : " FAIL",
            cls: msg.ok ? "hi" : msg.softFailure ? "dim" : "",
          },
          { text: msg.durationMs != null ? " · " + msg.durationMs + "ms" : "", cls: "dim" },
        ];
        if (msg.selectorUsed) {
          parts.push({ text: " · sel ", cls: "dim" });
          parts.push({ text: String(msg.selectorUsed).slice(0, 80) + (String(msg.selectorUsed).length > 80 ? "…" : ""), cls: "dim" });
        }
        const isSoft = !msg.ok && msg.softFailure;
        appendLogLine({
          ts,
          kind: isSoft ? "misc" : msg.ok ? "done_ok" : "done_fail",
          badge: isSoft ? "soft" : msg.ok ? "ok" : "fail",
          badgeClass: isSoft ? "b-misc" : msg.ok ? "b-ok" : "b-fail",
          htmlParts: parts,
        });
      } else if (e === "debug_pause") {
        els.debugContinueBtn.style.display = "inline-block";
        appendLogLine({
          ts,
          kind: "misc",
          badge: "pause",
          badgeClass: "b-misc",
          htmlParts: [
            { text: "пауза перед шагом #", cls: "hi" },
            { text: String(msg.step || ""), cls: "hi" },
            { text: " — нажмите «Продолжить отладку»", cls: "dim" },
          ],
        });
      } else if (e === "debug_resume") {
        els.debugContinueBtn.style.display = "none";
        appendLogLine({
          ts,
          kind: "run",
          badge: "cont",
          badgeClass: "b-run",
          htmlParts: [{ text: "продолжаем после шага #" + String(msg.step || "") }],
        });
      } else if (e === "run_cancelled") {
        currentStep = null;
        appendLogLine({
          ts,
          kind: "misc",
          badge: "stop",
          badgeClass: "b-misc",
          htmlParts: [
            { text: "остановка запрошена перед шагом #", cls: "hi" },
            { text: String(msg.step || ""), cls: "hi" },
          ],
        });
      } else if (e === "run_done") {
        okCount = msg.okCount ?? okCount;
        failCount = msg.failCount ?? failCount;
        runFinished = true;
        const cancelled = !!msg.cancelled;
        appendLogLine({
          ts,
          kind: "end",
          badge: "done",
          badgeClass: "b-end",
          htmlParts: [
            { text: cancelled ? "finished (stopped) · ok=" : "finished · ok=", cls: "dim" },
            { text: String(okCount), cls: "hi" },
            { text: " fail=", cls: "dim" },
            { text: String(failCount), cls: "hi" },
            { text: " · " + String(msg.totalMs ?? "") + "ms", cls: "dim" },
          ],
        });
        es.close();
      }
      renderSteps();
    };

    es.onerror = () => {
      appendLogLine({
        ts: Date.now() / 1000,
        kind: "misc",
        badge: "sse",
        badgeClass: "b-misc",
        htmlParts: [{ text: "stream disconnected" }],
      });
    };

    els.deriveBtn.addEventListener("click", async () => {
      els.deriveBtn.disabled = true;
      try {
        const r = await fetch("/api/runs/" + runId + "/derive-scenario", { method: "POST" });
        const j = await r.json();
        if (!j.ok) throw new Error(j.error || "failed");
        appendLogLine({
          ts: Date.now() / 1000,
          kind: "misc",
          badge: "derive",
          badgeClass: "b-misc",
          htmlParts: [{ text: "scenario · " }, { text: String(j.scenario?.id || ""), cls: "hi" }],
        });
        alert("Created: " + (j.scenario?.id || "ok"));
      } catch (err) {
        alert("Derive failed: " + (err?.message || err));
      } finally {
        els.deriveBtn.disabled = false;
      }
    });
  </script>
</body>
</html>
