<!doctype html>
<html lang="ru">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>XPath Helper — Flow Editor</title>
  <link rel="stylesheet" href="/static/reactflow.css" />
  <style>
    :root { --bg:#0f0f1a; --bg2:#1a1a2e; --bg3:#16213e; --text:#eee; --muted:#c4cad8; --accent:#00d4aa; --err:#e74c3c; --ok:#2ecc71; }
    * { box-sizing:border-box; }
    html, body { margin:0; height:100%; max-height:100%; background:var(--bg); color:var(--text); font-family: system-ui, -apple-system, Segoe UI, Roboto, sans-serif; overflow:hidden; }
    .app {
      display:grid;
      grid-template-columns: minmax(210px, 24vw) 1fr;
      height:100vh;
      max-height:100vh;
      gap:8px;
      padding:8px;
      box-sizing:border-box;
      overflow:hidden;
    }
    .panel {
      background:var(--bg2);
      border:1px solid #2a2a4a;
      border-radius:10px;
      padding:8px 10px;
      overflow:hidden;
      min-height:0;
      display:flex;
      flex-direction:column;
    }
    .panel-flow { display:flex; flex-direction:column; min-height:0; flex:1; overflow:hidden; }
    .panel-scroll { flex:1; min-height:0; overflow-y:auto; overflow-x:hidden; padding-right:2px; }
    .panel-side-left .title { flex-shrink:0; }
    .title { margin:0 0 6px 0; color:var(--accent); font-size:14px; }
    .hint { color:var(--muted); font-size:11px; line-height:1.35; margin:5px 0; }
    .row { display:flex; gap:6px; align-items:center; flex-wrap:wrap; }
    .btn { display:inline-flex; align-items:center; gap:6px; background: linear-gradient(135deg, var(--accent), #00b894); color:#000; border:0; border-radius:8px; padding:6px 10px; font-weight:700; font-size:12px; cursor:pointer; }
    .btn2 { background:var(--bg3); color:var(--text); border:1px solid #2a2a4a; border-radius:8px; padding:6px 8px; font-weight:600; font-size:12px; cursor:pointer; text-decoration:none; }
    .btn2:hover { border-color:var(--accent); }
    input, textarea, select { width:100%; background:var(--bg3); border:1px solid #2a2a4a; border-radius:8px; padding:6px 8px; color:var(--text); font-size:12px; }
    textarea { min-height:72px; resize:vertical; }
    .scenarioList { display:flex; flex-direction:column; gap:6px; margin-top:6px; flex:0 1 auto; min-height:0; max-height:36vh; overflow-y:auto; }
    .item { border:1px solid #2a2a4a; border-radius:8px; padding:6px 8px; background:#0a0a14; cursor:pointer; }
    .item:hover, .item.sel { border-color:var(--accent); }
    .small { font-size:11px; color:var(--muted); }
    /* React Flow требует ненулевую высоту: % часто даёт 0 в grid */
    .flowHost {
      flex: 1;
      min-height: 0;
      height: auto;
      border: 1px solid #2a2a4a;
      border-radius: 10px;
      overflow: hidden;
      background: #0a0a14;
    }
    .groupItem { border:1px solid #2a2a4a; border-radius:8px; padding:8px; margin-top:8px; background:#0a0a14; }
    .inlineColor { width:38px; padding:0; height:32px; border-radius:6px; border:1px solid #2a2a4a; }
    code { color: var(--accent); }
    .flow-toolbar { gap: 6px; flex-wrap: wrap; padding-bottom: 4px; border-bottom: 1px solid #2a2a4a; flex-shrink: 0; }
    .flow-ctx-menu button { white-space: nowrap; }
    .checkrow { display: inline-flex; align-items: center; gap: 6px; font-size: 12px; color: var(--muted); }
    /* Выбранная связь на канве */
    .react-flow__edge.selected .react-flow__edge-path {
      stroke: var(--accent) !important;
      stroke-width: 3.5px !important;
      filter: drop-shadow(0 0 6px rgba(0, 212, 170, 0.85));
    }
    /* Примитивы разметки (рамка / овал / текст) — подсветка выбора */
    .flow-annotation-selected {
      box-shadow: 0 0 0 2px #ffc857, 0 0 16px rgba(255, 200, 87, 0.35);
    }
    /* Точки соединения на примитивах разметки */
    .flowHost .react-flow__handle {
      opacity: 0.95;
    }
    .btn2.flow-tool-on {
      border-color: var(--accent) !important;
      box-shadow: 0 0 0 1px rgba(0, 212, 170, 0.45);
    }
    .flow-ann-resize-line {
      border-color: rgba(0, 212, 170, 0.85) !important;
    }
    .flow-ann-resize-handle {
      width: 9px !important;
      height: 9px !important;
      border-radius: 3px !important;
      background: #00d4aa !important;
      border: 2px solid #0f0f1a !important;
    }
    @keyframes flow-live-pulse {
      0%, 100% { filter: drop-shadow(0 0 10px rgba(0, 255, 204, 0.45)); }
      50% { filter: drop-shadow(0 0 18px rgba(0, 255, 204, 0.85)); }
    }
    .flowHost .react-flow__node.flow-node-live-exec {
      animation: flow-live-pulse 1.5s ease-in-out infinite;
    }
    @media (max-width: 1200px) {
      html, body { overflow:auto; max-height:none; }
      .app { grid-template-columns: 1fr; grid-template-rows: auto minmax(320px, 55vh); height:auto; min-height:100vh; max-height:none; overflow:visible; }
      .flowHost { min-height: 320px; }
    }
  </style>
</head>
<body>
  <div id="root">
    <div class="panel" style="margin:12px">
      <p class="hint">Загрузка Flow Editor…</p>
      <p class="hint">Если экран так и остаётся пустым: откройте консоль (F12). Убедитесь, что собран фронт:</p>
      <pre class="hint" style="background:#0a0a14;padding:10px;border-radius:8px;overflow:auto"><code>cd web-runner/flow-editor-src &amp;&amp; npm ci &amp;&amp; npm run build</code></pre>
    </div>
  </div>

  {# Тот же токен, что и для /api/* при XPATH_RUNNER_TOKEN (см. README). #}
  <script>
    window.__XPATH_RUNNER_TOKEN__ = {{ runner_token | tojson }};
  </script>
  <script type="module" src="/static/flow-editor.bundle.js"></script>
</body>
</html>
