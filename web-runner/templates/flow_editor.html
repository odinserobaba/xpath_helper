<!doctype html>
<html lang="ru">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>XPath Helper — Flow Editor</title>
  <link rel="stylesheet" href="/static/reactflow.css" />
  <style>
    :root { --bg:#0f0f1a; --bg2:#1a1a2e; --bg3:#16213e; --text:#eee; --muted:#c4cad8; --accent:#00d4aa; --err:#e74c3c; --ok:#2ecc71; }
    * { box-sizing:border-box; }
    html, body { margin:0; height:100%; background:var(--bg); color:var(--text); font-family: system-ui, -apple-system, Segoe UI, Roboto, sans-serif; }
    .app { display:grid; grid-template-columns: 320px 1fr 360px; height:100vh; gap:10px; padding:10px; }
    .panel { background:var(--bg2); border:1px solid #2a2a4a; border-radius:10px; padding:12px; overflow:auto; }
    .panel-flow { display:flex; flex-direction:column; min-height:0; }
    .title { margin:0 0 8px 0; color:var(--accent); font-size:16px; }
    .hint { color:var(--muted); font-size:12px; line-height:1.4; margin:6px 0; }
    .row { display:flex; gap:8px; align-items:center; flex-wrap:wrap; }
    .btn { display:inline-flex; align-items:center; gap:8px; background: linear-gradient(135deg, var(--accent), #00b894); color:#000; border:0; border-radius:10px; padding:8px 12px; font-weight:700; cursor:pointer; }
    .btn2 { background:var(--bg3); color:var(--text); border:1px solid #2a2a4a; border-radius:10px; padding:8px 10px; font-weight:600; cursor:pointer; text-decoration:none; }
    .btn2:hover { border-color:var(--accent); }
    input, textarea, select { width:100%; background:var(--bg3); border:1px solid #2a2a4a; border-radius:8px; padding:8px; color:var(--text); font-size:13px; }
    textarea { min-height:90px; resize:vertical; }
    .scenarioList { display:flex; flex-direction:column; gap:8px; max-height:50vh; overflow:auto; margin-top:8px; }
    .item { border:1px solid #2a2a4a; border-radius:8px; padding:8px; background:#0a0a14; cursor:pointer; }
    .item:hover, .item.sel { border-color:var(--accent); }
    .small { font-size:12px; color:var(--muted); }
    /* React Flow требует ненулевую высоту: % часто даёт 0 в grid */
    .flowHost {
      flex: 1;
      min-height: 480px;
      height: 58vh;
      border: 1px solid #2a2a4a;
      border-radius: 10px;
      overflow: hidden;
      background: #0a0a14;
    }
    .groupItem { border:1px solid #2a2a4a; border-radius:8px; padding:8px; margin-top:8px; background:#0a0a14; }
    .inlineColor { width:38px; padding:0; height:32px; border-radius:6px; border:1px solid #2a2a4a; }
    code { color: var(--accent); }
    .flow-toolbar { gap: 8px; flex-wrap: wrap; padding-bottom: 4px; border-bottom: 1px solid #2a2a4a; }
    .checkrow { display: inline-flex; align-items: center; gap: 6px; font-size: 12px; color: var(--muted); }
    /* Выбранная связь на канве */
    .react-flow__edge.selected .react-flow__edge-path {
      stroke: var(--accent) !important;
      stroke-width: 3.5px !important;
      filter: drop-shadow(0 0 6px rgba(0, 212, 170, 0.85));
    }
    /* Примитивы разметки (рамка / овал / текст) — подсветка выбора */
    .flow-annotation-selected {
      box-shadow: 0 0 0 2px #ffc857, 0 0 16px rgba(255, 200, 87, 0.35);
    }
    /* Точки соединения на примитивах разметки */
    .flowHost .react-flow__handle {
      opacity: 0.95;
    }
    .btn2.flow-tool-on {
      border-color: var(--accent) !important;
      box-shadow: 0 0 0 1px rgba(0, 212, 170, 0.45);
    }
    .flow-ann-resize-line {
      border-color: rgba(0, 212, 170, 0.85) !important;
    }
    .flow-ann-resize-handle {
      width: 9px !important;
      height: 9px !important;
      border-radius: 3px !important;
      background: #00d4aa !important;
      border: 2px solid #0f0f1a !important;
    }
    @media (max-width: 1200px) {
      .app { grid-template-columns: 1fr; grid-template-rows: auto auto auto; height:auto; min-height:100vh; }
    }
  </style>
</head>
<body>
  <div id="root">
    <div class="panel" style="margin:12px">
      <p class="hint">Загрузка Flow Editor…</p>
      <p class="hint">Если экран так и остаётся пустым: откройте консоль (F12). Убедитесь, что собран фронт:</p>
      <pre class="hint" style="background:#0a0a14;padding:10px;border-radius:8px;overflow:auto"><code>cd web-runner/flow-editor-src &amp;&amp; npm ci &amp;&amp; npm run build</code></pre>
    </div>
  </div>

  <script type="module" src="/static/flow-editor.bundle.js"></script>
</body>
</html>
